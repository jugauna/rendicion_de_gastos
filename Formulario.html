<script>
    const contenedor = document.getElementById('contenedor-tickets');

    /**

    /** Nota grabada solo con micrófono (sin cámara) */
    let notaVozBlob = null;
    let notaVozMimeLabel = '';
    let mediaRecorder = null;
    let mediaChunks = [];
    let grabacionStream = null;

    function nombreArchivoNotaVoz(mime) {
        const m = (mime || '').toLowerCase();
        if (m.includes('webm')) return 'nota-voz.webm';
        if (m.includes('mp4')) return 'nota-voz.mp4';
        if (m.includes('mpeg')) return 'nota-voz.mp3';
        return 'nota-voz.webm';
    }

    function refrescarFilaAudio() {
        const fila = document.getElementById('filaArchivoAudio');
        const span = document.getElementById('nombreArchivoAudio');
        const inputA = document.getElementById('inputExplicacionAudio');
        if (!fila || !span) return;
        let nombre = '';
        if (notaVozBlob && notaVozBlob.size) {
            nombre = nombreArchivoNotaVoz(notaVozMimeLabel || notaVozBlob.type) + ' (nota grabada)';
        } else if (inputA && inputA.files && inputA.files[0]) {
            nombre = inputA.files[0].name;
        }
        span.textContent = nombre;
        fila.classList.toggle('visible', Boolean(nombre));
    }

    function refrescarFilaFoto(input) {
        const bloque = input && input.closest('.bloque-ticket');
        if (!bloque) return;
        const fila = bloque.querySelector('.fila-archivo-foto');

            fila.classList.add('visible');
        } else {
            span.textContent = '';
            fila.classList.remove('visible');

    }

    function actualizarEstadoVoz(texto) {
        const el = document.getElementById('audioVozEstado');
        if (el) el.textContent = texto || '';
    }

    function puedeGrabarVozEnPagina() {
        return typeof MediaRecorder !== 'undefined'
            && navigator.mediaDevices
            && typeof navigator.mediaDevices.getUserMedia === 'function';
    }

    function initGrabacionVoz() {
        const btnG = document.getElementById('btnGrabarVoz');
        const btnD = document.getElementById('btnDetenerVoz');
        const inputA = document.getElementById('inputExplicacionAudio');
        if (!btnG || !btnD) return;

        if (!puedeGrabarVozEnPagina()) {
            btnG.disabled = true;
            actualizarEstadoVoz('Tu navegador no permite grabar aquí. Usá el selector de archivo con un memo de voz.');
            return;
        }

        btnG.addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') return;
            try {
                grabacionStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert('No se pudo usar el micrófono. Revisá permisos o adjuntá un audio con el campo de abajo.');
                return;
            }
            notaVozBlob = null;
            if (inputA) inputA.value = '';
            refrescarFilaAudio();
            mediaChunks = [];
            let mimeType = '';
            if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
            else if (MediaRecorder.isTypeSupported('audio/webm')) mimeType = 'audio/webm';
            else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';
            mediaRecorder = mimeType ? new MediaRecorder(grabacionStream, { mimeType }) : new MediaRecorder(grabacionStream);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size) mediaChunks.push(e.data);
            };
            mediaRecorder.onstop = () => {
                const t = mediaRecorder.mimeType || 'audio/webm';
                notaVozBlob = new Blob(mediaChunks, { type: t });
                notaVozMimeLabel = t;
                if (grabacionStream) {
                    grabacionStream.getTracks().forEach((tr) => tr.stop());
                }
                grabacionStream = null;
                mediaRecorder = null;
                btnG.classList.remove('recording');
                btnG.disabled = false;
                btnD.disabled = true;
                actualizarEstadoVoz('Nota de voz lista (' + Math.round(notaVozBlob.size / 1024) + ' KB). Podés enviar o grabar de nuevo.');
                refrescarFilaAudio();
            };
            mediaRecorder.start(200);
            btnG.classList.add('recording');
            btnG.disabled = true;
            btnD.disabled = false;
            actualizarEstadoVoz('Grabando… solo micrófono (sin cámara).');
        });

        btnD.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        });

        if (inputA) {
            inputA.addEventListener('change', () => {
                notaVozBlob = null;
                notaVozMimeLabel = '';
                actualizarEstadoVoz('');
                refrescarFilaAudio();

    // --- FUNCIÓN SENIOR: COMPRIMIR IMAGEN (CLIENT-SIDE) ---
    async function comprimirImagen(file) {
        return new Promise((resolve, reject) => {
            if (!file.type.startsWith('image/')) {
                reject(new Error('Solo se admiten imágenes (JPG).'));
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; // Un poco más de calidad para contabilidad
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Convertir a blob (formato JPEG, calidad 0.7 - balance ideal)
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject(new Error('Error en la compresión'));
                        }
                    }, 'image/jpeg', 0.7);
                };
            };
            reader.onerror = error => reject(error);
        });
    }

    function validarBloquesTickets() {
        const bloques = document.querySelectorAll('.bloque-ticket');
        const n = bloques.length;
        if (n < 1) {
            return { ok: false, mensaje: 'Debés agregar al menos un comprobante.' };

            const sel = bloques[i].querySelector('select[name^="ticket_categoria_"]');

        }
        return { ok: true, bloques, n };

                return;
            }
            const nombreGrab = nombreArchivoNotaVoz(notaVozMimeLabel || notaVozBlob.type);
            formData.append('explicacion_audio', notaVozBlob, nombreGrab);
        } else if (audioInput && audioInput.files && audioInput.files[0]) {
            const af = audioInput.files[0];
            if (af.size > maxBytesAudio) {
                alert('El archivo de voz supera 25 MB (límite de transcripción). Elegí uno más corto o sin audio.');
                btn.disabled = false;
                btn.innerText = 'Enviar Rendición';
                return;
            }
            if (af.size === 0) {
                alert('El archivo de audio está vacío. Elegí otro o quitá el audio.');
                btn.disabled = false;
                btn.innerText = 'Enviar Rendición';
                return;
            }
            const mimeLower = (af.type || '').toLowerCase();
            let nombreAudio = af.name && af.name.trim() ? af.name.trim() : 'explicacion.webm';
            if (mimeLower === 'video/quicktime' || /\.mov$/i.test(nombreAudio)) {
                nombreAudio = 'explicacion.mp4';
            } else if (!/\.(webm|mp3|m4a|mp4|ogg|wav|mpeg|mpga|mov)$/i.test(nombreAudio)) {
                if (mimeLower.includes('mp4') || mimeLower.includes('mpeg')) nombreAudio = 'explicacion.mp4';
                else if (mimeLower.includes('webm')) nombreAudio = 'explicacion.webm';
                else if (mimeLower.includes('mpeg')) nombreAudio = 'explicacion.mp3';
                else nombreAudio = 'explicacion.m4a';
            }
            formData.append('explicacion_audio', af, nombreAudio);
        }

        for (let i = 0; i < totalTickets; i++) {
            // Obtenemos el ID real (el contador) del bloque actual
            const idReal = bloques[i].id.split('-')[1];
            
            // Datos de texto del ticket (índice i alineado con ticket_foto_i en n8n)
            const selCat = bloques[i].querySelector('select[name^="ticket_categoria_"]');
            const inpObs = bloques[i].querySelector('input[name^="ticket_obs_"]');
            formData.append(`ticket_categoria_${i}`, selCat ? selCat.value : '');
            formData.append(`ticket_obs_${i}`, inpObs ? inpObs.value : '');
            
            // Comprobante: imagen comprimida a JPEG
            const inputFoto = bloques[i].querySelector('input[type="file"]');
            if (inputFoto.files[0]) {
                try {
                    const archivo = inputFoto.files[0];
                    const procesado = await comprimirImagen(archivo);
                    const nombreArchivo = `gasto_${idReal}.jpg`;
                    formData.append(`ticket_foto_${i}`, procesado, nombreArchivo);
                } catch (error) {
                    console.error('Error procesando ticket', idReal, error);
                    alert(`Error procesando el comprobante del ticket #${idReal}. Intente nuevamente.`);
                    btn.disabled = false; btn.innerText = 'Enviar Rendición';
                    return;
                }
            }
        }

        // UI State: Enviando
        btn.innerText = 'ENVIANDO A CONTABILIDAD...';

        // 3. Envío al Proxy PHP
        try {
            const resp = await fetch(PROXY_URL, {
                method: 'POST',
                mode: 'cors',
                cache: 'no-store',
                credentials: 'omit',
                body: formData
            });

            if (resp.ok) {
                mostrarToastExito(empleadoNombre);
                this.reset();
                limpiarNotaVozUi();
                contenedor.innerHTML = ''; contador = 0;
                crearNuevoBloqueTicket();
            } else {
                const errData = await resp.text();
                alert('Error en el servidor: ' + errData);
            }
        } catch (err) {
            console.error('Error de red:', err);
            const detalle = err && err.message ? err.message : String(err);
            alert(
                'No se pudo completar el envío (no siempre es falta de internet).\n\n' +
                'Proxy usado:\n' + PROXY_URL + '\n\n' +
                '• Comprobá en el navegador que esa URL abre el PHP (o da error de método GET, no 404).\n' +
                '• Subí proxy-n8n.php con CORS y el mismo path que arriba.\n' +
                '• Detalle: ' + detalle
            );
        } finally {
            // UI State: Reset
            btn.disabled = false; 
            btn.innerText = 'Enviar Rendición';
        }
    };
</script>

        50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
